[advisories]
db-path = "~/.cargo/advisory-db"
db-urls = ["https://github.com/rustsec/advisory-db"]
yanked = "warn"

# Exceptions for known advisories that need time to upgrade dependencies
# TODO: wasmtime 28.0.0 and its dependency chain needs careful coordination before upgrading
[[advisories.ignore]]
id = "RUSTSEC-2026-0007"
reason = "bytes: Integer overflow in BytesMut::reserve - transitive via wasmtime"

[[advisories.ignore]]
id = "RUSTSEC-2024-0436"
reason = "paste: unmaintained crate - transitive via wasmtime, will remove with wasmtime upgrade"

[[advisories.ignore]]
id = "RUSTSEC-2025-0055"
reason = "tracing-subscriber: ANSI escape sequence injection - transitive via plugin_wasm"

[[advisories.ignore]]
id = "RUSTSEC-2025-0046"
reason = "wasmtime: fd_renumber WASIp1 panic - version 28.0.0 known issue, requires major version bump"

[[advisories.ignore]]
id = "RUSTSEC-2025-0118"
reason = "wasmtime: Unsound API access to shared memory - version 28.0.0 known issue"

[[advisories.ignore]]
id = "RUSTSEC-2026-0020"
reason = "wasmtime: Guest-controlled resource exhaustion - version 28.0.0 known issue"

[[advisories.ignore]]
id = "RUSTSEC-2026-0021"
reason = "wasmtime: HTTP header field panic - version 28.0.0 known issue"

[licenses]
allow = [
    "0BSD",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-3-Clause",
    "BSD-2-Clause",
    "CC0-1.0",
    "ISC",
    "MIT",
    "MPL-2.0",
    "Unicode-3.0",
    "Zlib",
]
confidence-threshold = 0.8

[licenses.private]
ignore = false

[bans]
multiple-versions = "allow"
wildcards = "warn"
highlight = "all"

[sources]
unknown-registry = "warn"
unknown-git = "warn"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
allow-git = []
